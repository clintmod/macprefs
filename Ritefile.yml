version: '3'

tasks:
  default:
    silent: true
    cmds:
      - rite -l

  install-mise:
    desc: Install mise (runtime/tool version manager)
    aliases: [im]
    cmds:
      - curl https://mise.run | sh
    status:
      - command -v mise

  mise:
    desc: Install pinned tools (python, uv, rite) from mise.toml
    aliases: [m]
    deps: [install-mise]
    cmds:
      - mise install -y

  setup:
    desc: Install dev dependencies into .venv (idempotent)
    aliases: [s]
    cmds:
      - uv sync

  test:
    desc: Run tests with coverage
    aliases: [t]
    deps: [setup]
    cmds:
      - uv run pytest --cov=src --cov-report xml:cov.xml --cov-report term-missing

  test:watch:
    desc: Re-run tests on file changes
    aliases: [tw]
    deps: [setup]
    cmds:
      - uv run ptw --nobeep

  lint:
    desc: Run pylint
    aliases: [l]
    deps: [setup]
    cmds:
      # src/macprefs is listed explicitly: it has no .py extension, so the
      # glob misses it, but pylint lints any file passed by name.
      - uv run pylint src/*.py src/macprefs tests/*.py

  build:
    desc: Build the brew package from committed HEAD, install, verify, uninstall
    aliases: [b]
    cmds:
      - ./ci/scripts/brew-build-test.sh

  clean:
    desc: Remove generated files
    aliases: [c]
    cmds:
      - find . -name '*.pyc' -delete
      - rm -rf __pycache__ .pytest_cache .cache .tmontmp .coverage .testmondata cov.xml

  publish:
    desc: Tag, push to github, and update the brew formula with the new url and sha256
    aliases: [p]
    deps: [test]
    cmds:
      - uv run python src/publish.py

  teardown:
    desc: Remove the local dev environment (counterpart to setup)
    cmds:
      - rm -rf .venv
