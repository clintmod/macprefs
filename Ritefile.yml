version: '3'

tasks:
  default:
    silent: true
    cmds:
      - rite -l

  install-mise:
    desc: Install mise (runtime/tool version manager)
    aliases: [im]
    cmds:
      - curl https://mise.run | sh
    status:
      - command -v mise

  mise:
    desc: Install pinned tools (python, uv, rite) from mise.toml
    aliases: [m]
    deps: [install-mise]
    cmds:
      - mise install -y

  setup:
    desc: Install dev dependencies into .venv (idempotent)
    aliases: [s]
    cmds:
      - uv sync

  test:
    desc: Run tests with coverage (fails under 95%)
    aliases: [t]
    deps: [setup]
    cmds:
      - uv run pytest --cov=src --cov-branch --cov-fail-under=95 --cov-report xml:cov.xml --cov-report term-missing

  test:watch:
    desc: Re-run tests on file changes
    aliases: [tw]
    deps: [setup]
    cmds:
      - uv run ptw --nobeep

  lint:
    desc: Run all linters in parallel (pylint, ruff, shellcheck, actionlint)
    aliases: [l]
    deps: [lint:pylint, lint:ruff, lint:shell, lint:actions]

  lint:pylint:
    desc: Run pylint
    deps: [setup]
    cmds:
      # src/macprefs is listed explicitly: it has no .py extension, so the
      # glob misses it, but pylint lints any file passed by name.
      - uv run pylint src/*.py src/macprefs tests/*.py

  lint:ruff:
    desc: Run ruff check
    deps: [setup]
    cmds:
      - uv run ruff check src tests

  format:check:
    desc: Check formatting without changing files
    aliases: [fc]
    deps: [setup]
    cmds:
      - uv run ruff format --check src tests

  typecheck:
    desc: Type-check with pyright (basic mode; untyped codebase)
    aliases: [tc]
    deps: [setup]
    cmds:
      - uv run pyright src tests

  bandit:
    desc: Security-lint the source with bandit
    deps: [setup]
    cmds:
      - uv run bandit -c pyproject.toml -q -r src

  deptry:
    desc: Check for missing/unused dependencies
    deps: [setup]
    cmds:
      - uv run deptry .

  gitleaks:
    desc: Scan the full git history for leaked secrets
    cmds:
      - gitleaks git --no-banner

  check:
    desc: Run every check (what CI runs)
    deps: [test, lint, format:check, lock:check, typecheck, bandit, deptry, gitleaks, audit]

  lint:shell:
    desc: Shellcheck the ci scripts
    cmds:
      - shellcheck ci/scripts/*.sh

  lint:actions:
    desc: Lint and security-audit the GitHub Actions workflows
    deps: [setup]
    cmds:
      - actionlint
      - uv run zizmor .github/workflows

  lock:check:
    desc: Verify uv.lock is in sync with pyproject.toml
    aliases: [lc]
    cmds:
      - uv lock --check

  format:
    desc: Format the codebase with ruff (also sorts imports)
    aliases: [f]
    deps: [setup]
    cmds:
      - uv run ruff check --fix src tests
      - uv run ruff format src tests

  audit:
    desc: Scan locked dependencies for known vulnerabilities
    aliases: [a]
    deps: [setup]
    cmds:
      - uv run pip-audit --skip-editable

  build:
    desc: Build the brew package from committed HEAD, install, verify, uninstall
    aliases: [b]
    cmds:
      - ./ci/scripts/brew-build-test.sh

  clean:
    desc: Remove generated files
    aliases: [c]
    cmds:
      - find . -name '*.pyc' -delete
      - rm -rf __pycache__ .pytest_cache .cache .tmontmp .coverage .testmondata cov.xml

  publish:
    desc: Tag, push to github, and update the brew formula with the new url and sha256
    aliases: [p]
    deps: [test]
    cmds:
      - uv run python src/publish.py

  teardown:
    desc: Remove the local dev environment (counterpart to setup)
    cmds:
      - rm -rf .venv
