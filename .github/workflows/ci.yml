name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      # Installs the pinned toolchain (python, uv, rite) from mise.toml,
      # so CI runs the exact same tasks as a dev machine.
      - uses: jdx/mise-action@v4

      - name: Test
        run: rite test

  # One job per linter so the PR checks list shows each check's status
  # at a glance instead of bundling them behind a single "lint" line.
  lint:
    strategy:
      fail-fast: false
      matrix:
        check: [pylint, ruff, shell, actions]
    name: lint:${{ matrix.check }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4

      - name: Lint (${{ matrix.check }})
        run: rite lint:${{ matrix.check }}

  # Single-task jobs, one row per check on the PR.
  checks:
    strategy:
      fail-fast: false
      matrix:
        check: ["format:check", typecheck, bandit, deptry, audit]
    name: ${{ matrix.check }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4

      - name: Run ${{ matrix.check }}
        run: "rite ${{ matrix.check }}"

  gitleaks:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # gitleaks scans the full commit history
          fetch-depth: 0

      - uses: jdx/mise-action@v4

      - name: Scan git history for secrets
        run: rite gitleaks

  # "Does it build": render the formula against a tarball of HEAD, brew
  # install it, run the formula test block, then a real `macprefs backup`
  # end-to-end on the runner.
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4

      - name: Build, install, and smoke test the brew package
        run: rite build

  # Verifies the documented contributor workflow from a bare machine,
  # exactly as the README's "Getting started" section describes it:
  # curl-install mise -> mise install -> rite setup -> rite test lint.
  # The jobs above use mise-action, which is faster but not the path a
  # fresh contributor actually follows.
  contrib-workflow:
    runs-on: macos-latest
    # mise resolves github:clintmod/rite via the GitHub API; unauthenticated
    # requests share the runner IP's 60/hr quota and 403 constantly. The
    # other jobs get a token injected by mise-action; this one bootstraps
    # bare, so pass the workflow token explicitly. (Locally, mise picks up
    # your gh CLI auth instead.)
    env:
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7

      - name: Bootstrap per README and run tests
        run: |
          curl https://mise.run | sh
          export PATH="$HOME/.local/bin:$PATH"
          mise trust
          mise install -y
          mise exec -- rite setup
          mise exec -- rite test
          mise exec -- rite lint
