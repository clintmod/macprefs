name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python3 -m pip install -r requirements.txt

      - name: Test
        run: make test

      - name: Lint
        run: make lint
