name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # Installs the pinned toolchain (python, uv, rite) from mise.toml,
      # so CI runs the exact same tasks as a dev machine.
      - uses: jdx/mise-action@v2

      - name: Test
        run: rite test

      - name: Lint
        run: rite lint
